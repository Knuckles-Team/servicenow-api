---
services:
  servicenow-agent:
    # image: docker.io/knucklessg1/servicenow:latest
    build:
      context: . # Debug
      dockerfile: debug.Dockerfile
    container_name: servicenow-agent
    hostname: servicenow-agent
    command: [ "servicenow-agent" ]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    restart: always
    volumes:
      - ./workspace:/app/workspace
    env_file:
      - .env
    environment:
      - "PYTHONUNBUFFERED=1"
      - "HOST=0.0.0.0"
      - "PORT=9504"
      - "TRANSPORT=stdio"
      - "SERVICENOW_INSTANCE=${SERVICENOW_INSTANCE}"
      - "SERVICENOW_USERNAME=${SERVICENOW_USERNAME}"
      - "SERVICENOW_PASSWORD=${SERVICENOW_PASSWORD}"
      - "SERVICENOW_SSL_VERIFY=${SERVICENOW_SSL_VERIFY:-True}"
      - "PROVIDER=openai"
      - "LLM_BASE_URL=${LLM_BASE_URL:-http://host.docker.internal:1234/v1}"
      - "LLM_API_KEY=${LLM_API_KEY:-llama}"
      - "MODEL_ID=${MODEL_ID:-google/gemma-4-31b}"
      - "DEBUG=True"
      - "ENABLE_WEB_UI=True"
      - "ENABLE_OTEL=True"
    ports:
      - "9504:9504"
    healthcheck:
      test: [ "CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9504/health')" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
